onboarding:
  completed: false
  last_completed_step: "not-started"

workspace:
  mode: "public-template"
  recommendedPrivateWorkspace: "../apply-ai-private"
  keepPersonalDataPrivate: true

market:
  # Use "germany" for the API-first DACH/Germany market pack.
  active: "germany"

geography:
  countries: []
  cities: []
  remotePolicy: "hybrid"

limitations:
  confirmed: false
  unavailableCountries: []
  languageLimits:
    # Example:
    # - language: "German"
    #   currentLevel: "A2"
    #   learningLevel: "B1"
    #   maxRoleRequirement: "B1"
  rejectPostingLanguages: []
  notes: []

searchMode:
  mode: "balanced"
  minimumScore: 60

rolePreferences:
  targetRoleBreadth: "balanced"
  preferredRoleFamilies: []
  includedKeywords: []
  excludedKeywords: []
  targetSeniorities: []
  openToInternships: false
  preferredIndustries: []
  preferredCompanyStages: []

companyPreferences:
  preferredCompanies: []
  acceptedCompanies: []
  excludedCompanies: []
  customCompanies: []
  # If no companies are accepted yet, portals:build can seed the scan plan
  # from the top companies in profile/recommendations.yml.
  autoTrackRecommendedCompanies: true
  recommendationFallbackLimit: 10

documents:
  rawDir: "intake/raw"
  normalizedDir: "intake/normalized"
  wikiDir: "profile/wiki"
  factsPath: "profile/facts.yml"
  recommendationsPath: "profile/recommendations.yml"

applicationMaterials:
  outputFormat: "pdf"
  formattingApproved: false
  formattingSamplePath: ""
