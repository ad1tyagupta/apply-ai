conflict_resolutions:
  - subject: "Weights & Biases"
    decision: "Move to backlog."
    reason: "Research suggested public Greenhouse or Lever access, but tested public API paths returned 404 on 2026-04-19."
  - subject: "Datapao"
    decision: "Keep API-ready with validated global Greenhouse API host."
    reason: "Research suggested the EU API host, but the working public endpoint is boards-api.greenhouse.io."
  - subject: "Helsing, Celonis, Supabase"
    decision: "Keep API-ready with medium confidence where the endpoint validated."
    reason: "Research sources disagreed on visible career surface/provider."
  - subject: "SmartRecruiters, Workday, Softgarden, Personio, custom pages"
    decision: "Keep in backlog unless a v1-compatible public API endpoint is verified."
    reason: "These providers need separate parsing, browser discovery, or stronger stale-link handling."
